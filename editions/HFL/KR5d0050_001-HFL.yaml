  text: 素履子卷上
  hash: sha256:6a07d850c49b431e2f9768403642502f629d94eae6f7066d117aacc87b922015
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0050_HFL_001-001a, image: hfl/0672/0672-016.png}
body:
  text: 將仕郎試大理評事賜緋魚袋張弧撰履道素履子曰道本無名無名居天地之始天地之始號曰混元混元之初無形無象既分二儀能生萬象故云之爲道初自龍漢三皇依之設教五帝依之置治始於一化淳朴自然將明寒暑之期遂分隂陽之序上古聖人履之無言無教無心於物物來歸之不教於民民皆仰之此則履純朴皇道也畫卦之主嘗草之君皆履之而化成至於伏牛乘馬履之而去彊暴用之而除民害顓頊履之於忠順帝嚳履之於清和唐堯履謙順之道而垂裳虞舜履孝悌之道而授讓此履帝道也禹行勤儉之道而治水湯能恭敬而感天西伯以至德而稱尊武王以孝道而去虐此聖人以王道設教使老有所終壯有所用幼有所長鰥寡孤獨廢疾者皆有所養男有分女有歸此以道治世之化也至於黄老唯尚朴而不文素王亦歸之於純素莫不去華飾而作教捨文艶以歸眞不尚賢使人不爭不貴難得之貨使人不盜責山節藻梲之宇尚卑宫菲食之君道德經云吾有三寳保而持之一曰慈二曰儉三曰不敢爲天下先此則履道之原也兼曰吾有大患爲吾有身及吾無身吾有何患此則至道者亡身履象外之道也至於餐霞食氣塞兌轉丸履離塵之道也昔鴟夷子在俗教民種植持生之道竟乘舟而去嚴眞人卜肆教人忠孝之道乃拔宅而昇此乃大道不器在物皆有知道不虚行物有玄應不在高臺廣厦之間東林西域之内近代淮南高公置延和閣求道非也立身行道之本未若君睦臣忠父慈子孝兄友弟恭夫順妻貞勤儉於家忠良於國昔夏殷文武得道而昌桀紂幽厲失道而亡夫如是道不可捨得之則昌失之則亡故聖人愛人惠俗施德保位者也人之於道如魚之在水魚失水則亡人失道則喪牢籠萬象以道治之爲之大道欲昌其身宜履而行之明矣履德素履子曰太上貴德德者衆善所歸百福所集昔舜有羶德而人歸之如蟻羶不慕蟻而蟻慕羶舜不慕民而民慕德文王爲西伯三分天下歸周者二西伯之德猶種竹以待禽竹不慕禽禽爲鸇所逐而自來投竹周不慕民民爲紂所虐而自來投周是知德可施而虐不可肆常以好生之德洽于民心誕敷文德遠方來格故古昔帝王皆立德以垂教五行五帝在木曰木德在火曰火德在土曰土德在金曰金德在水曰水德五行相生遞相爲德所以水火金木土穀正德利用厚生爲之九功立教於萬祀此德之用也德之施也無名在物物皆得之則存失之則喪天若失德寒暑不時地若失德萬物不生人若失德身必將傾故大禹謀九功臯陶謀九德天下是治君以慈愛立德臣以忠孝成名德唯善政政在養民養民之本在武則有七禁暴戢兵保大定功安民和衆豐財文則有五温良恭儉讓恭寬信敏惠皆歸五德德也者能却水火能感鬼神狎伏龍蛇化敷禽獸亦能退舍星象亦能整復山河桑穀自枯妖禽亦逝瘞蛇之子捨金之賔遺藥於敵人馳酒於盜者捨絶纓之過成漆身之忠皆施之於隂功而獲陽報夫如是宜施之於萬類不可失之於一言天道無親唯德是輔有國有家幸其履之瞬息無倦昌矣盛矣履忠素履子曰忠貞者天地之秀氣人倫之英靈凡觀歷世之書唯忠實者名挂史筆萬世常存則亡之忠者不滅亡也昔周公至忠事文王武王至成王成王自襁褓事之於三世盡忠金玉莫比其堅松竹莫比其操至於祝九齡之壽乃自剪爲性託六尺之孤遂去管蔡之佞事雖往古行跡常新列於典籍之中常爲賢哲之範太公行王風而治周室主霸典而滅紂邦二人夾輔於周功業垂於萬祀復聞管仲相桓公一匡天下以尊周子房佐劉氏統洪溝以興漢至於召四皓而迴惠帝抱幼主而朝諸侯亦有卧屍折檻之士碎首投鑊之臣今古所推實謂忠節若指鹿爲馬以玄爲黄脅弱欺孤廢賢奪義生則舂喉臠肉没爲後世責嫌汙辱二儀之中濫簉三才之内是知忠賢宜旌之不朽爲今世間傑來世美談詩曰淑人君子其儀不忒賢者履之盛矣履孝素履子曰經云夫孝天之經也地之義也人之行也兼曰夫孝德之本教之所由生治國治家者立德爲先立德之本孝之爲始昔舜禹有至德至孝存身立德而成皆以孝行舜讓而尊故云先王有至德要道以順天下民用和睦上下無怨孝之始也孝感天地應乎神明天子孝龜龍負圖庶人孝草木榮茂昔曾子孝父母身體髮膚不敢毁傷至于終身跬步之間不忘孝道義利一切禽獸草木取之以時不違天道竭力盡忠此爲孝子之志也夫人有百行不孝者如玉屑盈匣終無用也能行孝道者自然神明上生天帝添筭身安事吉榮顯於時幸君子履之保百福矣素履子卷上
