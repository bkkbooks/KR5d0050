body:
  text: 將仕郎試大理評事賜緋魚袋張弧撰履仁素履子曰古者嘗草之君教民粒食而止殺至仁之化也黃帝為民除害殺蚩尤至仁之教也大羅氏作網罟除禽獸之害至仁之用也堯舜用八元八凱明四目達四聰至仁之治也禹鑿龍門去水害至仁之功也湯去三面羅至仁之政也文王葬枯骨至仁之惠也紂失仁武王殺之飾微子之墟捨箕子之囚封比干之墓乃得赤雀銜書之瑞云仁得之仁守之福廕百代天使人君用仁守國故罪己泣辜吞蝗咽蛭所以興也秦不仁焚書坑儒身沒沙丘不及二代子嬰為劉項所競漢履仁約法捨子嬰而得天下楚不仁暴物殺子嬰而失天下是知履仁為興國之本故可履之孔聖云仁者愛人亦曰好生惡殺為仁愛人利物為仁克己復禮為仁慈惠惻隱為仁賞善罰惡拯溺救危皆仁人之履也士有殺身以成仁亡命以成仁設食於翳桑板築於危徑或救黃雀或放白龜惠封於傷蛇探喉於鯁虎博施無倦惠愛有方春不伐樹覆巢夏不燎田傷禾秋賑孤恤寡冬覆蓋伏藏君子順時履仁而行仁功著矣易曰天地之大德曰生聖人之大寶曰位又曰君子體仁足以長人唯至賢履之無倦而已履義素履子曰理財正辭禁民為非曰義所以義者不競於物而物自歸之孔子曰義然後取人不厭其取昔周太王之太子曰太伯大王有疾太伯義讓其位乃為父採藥而不返後季歷立封太伯於吳夫有義必能讓能讓必能和王者履義讓必能和協萬邦賞善罰惡立功立事以義除不義昔者桀惑於妹喜亡義而喪德紂好妲己失義而害忠賢周幽王寵褒姒乖義而失諸侯晋獻公悅驪姬而終失義於世子鄭莊姜寵過致叔段不悌龐涓疾賢死為不義之友羅敷沈河魯胡永為乖義之夫三閭溺於汩羅楚淮王為不義之主子胥得浣紗女終成守義之賢士有觸槐刎頸煄目漆身之義管鮑陳雷立義名摽前史是知義不可不履而不可乖孔子云不義而富且貴於我如浮雲先聖賤不義也若不義而死捨義而生則浪生死矣是不賢也能義和骨肉昆弟在物以義履之有何爭哉故君子義以為質履而行之固無乖矣履智素履子曰夫智者五行之德水水以潤下為德智以謀慮為能智不能慮無以為能水不能潤無以為德是以水流不止智用無滯水混則濁智撓則亂濁則不能鑒亂則不能慮未若止水而能清定智而能明水止智定則清且明矣如水决流不止則浸漬以成弊智用不端則惑亂以招禍夫賢者用智能周萬類若夫鏡之鑒物妍醜俱見其中如朗月之當空泉沼皆臨其內觀照遐邇明辨是非知衆之苦辛減己之逸樂齊飽暖於一體慮寒餒於四人故能運智而佐帝王設慮以防姦弊所以子房陳平智周而成商鞅蘇秦智訛而轘夫有國有家者履智而能明能慮則禍患弗可及也履信素履子曰信之為大人所重焉天失信三光不明地失信四時不成人失信五德不行故孔宣父云大車無輗小車無軏其何以行之哉謂人無信不可行也子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立治邦不可失信昔周幽王西患犬戎北患獫狁王與諸侯立信約舉烽擊鼓則諸侯救至褒姒戲而舉之諸侯皆至無寇乃是妃后戲耳後犬戎逼王城舉烽火擊鼓召諸侯諸侯皆言妃后戲耳遂不至幽王乃為犬戎所殺此戲而失信之故也故齊桓不遺曹翽之盟晋文捨原以示信俱為霸主諸侯皆從之所以不乖竹馬之期不爽虞人之約王者履信則神龜見矣故用人之智去其詐用人之勇去其怒用人之仁去其貪用智者之謀勇者之斷仁者之施足以成治矣詐害民信怒害民恩貪害民財三害亂之原也是知可終身而守約不可斯須而失信易云天所助者順也人所助者信也君子仗忠信而為甲胄履之無爽矣履禮素履子曰禮者天地四時之正氣人倫三綱之端首在物皆敬於人必周故能定親疏决嫌疑别同異明是非守道立德履之方成教訓正俗履之方備决爭訟辨是非君臣上下父子兄弟軍旅征伐祭祀鬼神履之方成其政教郊天祀地禮之為大經所備焉夫父慈子孝兄良弟悌夫義婦聽長惠幼順君仁臣忠之道禮之本也士唯履之無暫乖失無小大無衆寡無敢慢故君子正其衣冠尊其瞻視望之儼然即之也溫聽其言也厲無欺暗室不愧屋漏明則有禮樂幽則有鬼神是以賢者昏行不變節夜浴不改容唯禮唯敬履之則安失之則危詩曰相鼠有體人而無禮人而無禮胡不遄死易曰藉用白茅禮敬之至也素履子卷中
