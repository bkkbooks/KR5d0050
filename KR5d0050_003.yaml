front:
  text: 素履子卷下
  hash: sha256:102e012eb8f92dc7437737a3c537c49c4a5e22572195444f62ded402526b4d3a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0050_HFL_003-001a, image: hfl/0672/0672-037.png}
body:
  text: 將仕郎試大理評事賜緋魚袋張弧撰履樂素履子曰夫樂者天地四時之和也故律吕調則隂陽和五音調則四時叙是故古昔帝王制禮作樂以化民也是以黃帝曰雲門顓頊曰六䪫帝嚳曰五英堯曰咸池舜曰大韶禹曰大夏湯曰大濩武王曰大武皆八代之樂也用彰其德以明其功故天地四時皆順從其化夫八聲之用樂記曰鍾聲鏗鏗以立號號以立橫橫以立武君子聽鍾聲則思武巨石聲硜硜以立别别以致死君子聽磬聲則思死封疆之臣絲聲哀哀以立廉廉以立志君子聽琴瑟之聲則思志義之臣竹聲濫濫以立會會以聚衆君子聽竽笙簫管之聲則思畜聚之臣鼙鼓之聲歡歡以立動動以進衆君子聽鼙鼓之聲則思將帥之臣五音之用也五行之音以調正氣春之角以其清濁中人之象春氣和則角聲調樂記曰角亂則憂其民怨也夏之徵以其徵清事之象也夏氣和則徵聲調樂記曰徵亂則哀其事勤也季夏之宫以其最大樂記曰宫亂則荒其君驕也秋之商以其濁中次宫臣之象也秋氣和則商聲調樂記曰商亂則陂其臣壞也冬之羽以其最清物之象也冬氣和則羽聲調樂記曰羽亂則危其財匱也此五音八聲之用也所以人情不能免也用之祭天地乃天神降地祇升用之祭山川則鬼神嚮用之化人則人民和故得其節則樂行而倫清耳目聰明血氣和平移風易俗天下皆寧用失其節則鄭衛之音作桑間濮上之風行所以治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困又清為君濁為臣清為陽濁為隂清濁不亂君臣和平隂陽順序賢者聽其音而知其治然五帝殊時不相沿樂三王異代不相襲禮至於禮情主敬樂情主和敬之與和萬代不易是以禮節之於繁樂節之於過禮繁則亂樂過則淫節樂止淫履之本也履富貴素履子曰富與貴是人之所欲不以其道得之不處也當修德而取富貴得富貴也持盈守成恭儉謙讓節用而愛人克己而復禮施而不望報惠而不費財不濫其居不飾其服遇凶年不儉遇豐歲不奢是以管仲鏤簋朱紘山節藻梲君子以為濫晏平仲祀其先人豚肩不掩豆瀚衣彈冠以朝君子以為隘則君子當其位行其道不逾越而奢侈不儉陋而乖禮不過淫於聲色不貪暴於貨財絶驕奢去耽嗜貶酒闕色避嫌遠疑濟物利人安民和衆常守謙愼之心不忘忠孝之志道經云知足者富孝經曰高而不危所以長守貴滿而不溢所以長守富易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可逾又曰勞謙君子有終吉履貧賤素履子曰貧與賤是人之所惡不以其道得之不去也士志於道而耻惡衣惡食者未足與議也君子憂道不憂貧不患貧而患不安昔釣魚之叟蓬巖之士貧而遂通故賢子夏之鶉衣原憲之桑樞顔子一簞食一瓢飲飯蔬食飲水曲肱而枕之樂亦在其中矣曾子正冠而纓斷納履而踵决整襟而肘見曳屣而歌商頌聲滿天下若出金石天子不得為臣諸侯不得為友此致道者亡身養志者亡命此皆貧而樂道者也亦有門栽五柳庭植三荆扣角而歌採樵而詠皆履貧之士也賢者在事載土而歸留犢而去常遠三惑早愼四知士之廉而履貧者也或捨金存寶棄重言不謙蝸舍之居而守蓬蒿之室飲水食菜守道安貧悉士之至賢高尚其道孔宣父云不知命無以為君子命者窮達之分皆自樂天知命而已若好勇疾貧臨財苟得非君子之人欲慕賢哲之蹤則不恥緼弊之袍蓽門圭竇者矣履平素履子曰稱之用也取之於衡車之行也通之於轍衡平則毫釐不差轍通則轅轂無滯稱若失之於毫釐則權衡不正車若虧之於轅轂則轍跡難通欲稱之平則愼之於毫釐欲轍之通宜治之於轅轂毫釐不失轅轂無虧則謂天平地成乃取易象上天下澤履君子以辨上下定民志履之時用居安慮危履平慮蹶所以禮云積而能散安而能遷此君子履平而思進也子房素書曰衣不舉領者倒走不視地者顛士若耽逸遊好財色嗜酒多私則平地生坑坎安處有危亡是以易曰九三君子終日乾乾夕惕若厲亦曰履道坦坦幽人貞吉故詩曰謂天蓋高不敢不局謂地蓋厚不敢不蹐皆如履薄臨深履平之至也履危素履子曰居屯蒙危難之時常見易象云雲雷屯君子以經綸初九盤桓利居貞復見山下有險險而止蒙退則困險進則閡山蒙以養正乃聖功也君子以果行育德屯之時用利在居貞蒙之時宜利於養正是知貞之與正可以涉危難矣虞舜潜居中冀仁孝之心唯堅周公出往東征忠實之志益盛展禽三黜而不已直道子文三已而無愠辭西伯拘羑里仁德愈明冶長囚縲紲而賢行不替遭匡不改仁聖厄陳不徹鼓琴君子福至不喜禍至不懼不緇不磷潔白之德益彰不雕不衰清貞之操彌盛詩曰我心匪石不可轉也我心匪席不可卷也又曰風雨如晦雞鳴不已聖賢若是所以長思鴟梟之篇鵬鳥之賦然而履虎尾畏懼訴訴涉險難愼危兢兢易曰視履考祥其旋元吉又曰進退不失其正者其唯聖人乎履道亨矣素履子卷下
